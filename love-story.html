<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapters — Our Story</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --paper: #f3ede3;
    --blush: #e8c4b8;
    --rose: #c97d6e;
    --wine: #8b3a3a;
    --ink: #2c1f1f;
    --muted: #8a7a72;
    --stamp-red: #c0392b;
    --stamp-blue: #2c6496;
    --gold: #c9a84c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 20%, rgba(201,125,110,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(139,58,58,0.06) 0%, transparent 50%);
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 48px 24px 32px;
    border-bottom: 1px solid rgba(201,125,110,0.2);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 5vw, 3.4rem);
    color: var(--wine);
    letter-spacing: -0.02em;
  }
  header p {
    color: var(--muted);
    font-size: 0.92rem;
    margin-top: 6px;
    font-style: italic;
  }

  /* ── LAYOUT ── */
  .container { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }

  /* ── FORM CARD ── */
  .form-card {
    background: white;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 4px 40px rgba(44,31,31,0.07), 0 1px 4px rgba(44,31,31,0.04);
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
  }
  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--blush), var(--rose), var(--wine));
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--wine);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── IMAGE UPLOAD ── */
  .upload-zone {
    border: 2px dashed var(--blush);
    border-radius: 14px;
    background: var(--paper);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover { border-color: var(--rose); background: #f8ede6; }
  .upload-zone input { display: none; }
  .upload-zone .upload-icon { font-size: 2.4rem; margin-bottom: 10px; }
  .upload-zone .upload-text { color: var(--muted); font-size: 0.9rem; }
  .upload-zone .upload-text strong { color: var(--rose); }

  /* ── IMAGE PREVIEW (full-size scroll) ── */
  .image-preview-wrapper {
    display: none;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }
  .image-preview-wrapper.has-image { display: flex; }

  .image-scroll-area {
    max-height: 400px;
    overflow: auto;
    border-radius: 14px;
    border: 2px solid var(--blush);
    background: #1a1a1a;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    position: relative;
  }
  .image-scroll-area img {
    display: block;
    max-width: 100%;
    /* No max-height — full original ratio */
    height: auto;
    border-radius: 12px;
  }
  .image-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .btn-change {
    background: none;
    border: 1px solid var(--blush);
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 0.82rem;
    color: var(--rose);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-change:hover { background: var(--blush); color: var(--wine); }

  /* ── STAMP EFFECT OPTIONS ── */
  .stamp-options {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .stamp-opt {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--blush);
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    background: white;
  }
  .stamp-opt.active { background: var(--rose); border-color: var(--rose); color: white; }
  .stamp-opt:hover:not(.active) { border-color: var(--rose); color: var(--rose); }

  /* ── FORM FIELDS ── */
  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:600px) { .fields-grid { grid-template-columns: 1fr; } }

  label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 5px; font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase; }
  input[type=text], input[type=date], textarea {
    width: 100%;
    border: 1.5px solid #e8e0d8;
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    background: var(--paper);
    transition: border-color 0.2s;
    outline: none;
  }
  input:focus, textarea:focus { border-color: var(--rose); background: white; }
  textarea { resize: vertical; min-height: 80px; }

  .field-group { display: flex; flex-direction: column; }

  /* ── HEART RATING ── */
  .mood-section { margin-top: 20px; }
  .mood-label { font-size: 0.82rem; color: var(--muted); margin-bottom: 12px; font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase; }

  .heart-rating {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .heart-rating .heart {
    font-size: 2rem;
    cursor: pointer;
    color: #e0d0ca;
    transition: transform 0.15s, color 0.15s;
    line-height: 1;
    user-select: none;
  }
  .heart-rating .heart:hover,
  .heart-rating .heart.lit {
    color: var(--rose);
    transform: scale(1.18);
  }
  .heart-rating .heart.lit { filter: drop-shadow(0 2px 6px rgba(201,125,110,0.45)); }

  .mood-caption {
    margin-left: 10px;
    font-size: 0.88rem;
    color: var(--muted);
    font-style: italic;
    min-width: 90px;
    transition: color 0.2s;
  }

  /* ── SUBMIT ── */
  .btn-save {
    width: 100%;
    margin-top: 28px;
    padding: 14px;
    background: linear-gradient(135deg, var(--rose), var(--wine));
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(139,58,58,0.3); }
  .btn-save:active { transform: translateY(0); }

  /* ── CHAPTERS LIST ── */
  .chapters-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .chapters-header h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--wine); }

  .chapters-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px;
  }

  /* ── MEMORY CARD ── */
  .memory-card {
    background: white;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(44,31,31,0.08);
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .memory-card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(44,31,31,0.13); }

  /* Stamp image area */
  .card-image-area {
    position: relative;
    height: 180px;
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card-image-area canvas { display: block; max-width: 100%; max-height: 100%; }

  .card-body { padding: 16px; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--ink); margin-bottom: 4px; }
  .card-date { font-size: 0.78rem; color: var(--muted); margin-bottom: 8px; }
  .card-note { font-size: 0.85rem; color: var(--ink); line-height: 1.5; opacity: 0.8; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 10px; }
  .card-mood { font-size: 1.1rem; }

  .card-actions {
    display: flex;
    gap: 8px;
    padding: 0 16px 14px;
  }
  .card-btn {
    flex: 1;
    padding: 7px;
    border-radius: 8px;
    border: 1.5px solid #e8e0d8;
    background: white;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
  }
  .card-btn:hover { background: var(--paper); color: var(--ink); }
  .card-btn.edit { border-color: var(--blush); color: var(--rose); }
  .card-btn.edit:hover { background: #fff0ec; border-color: var(--rose); }
  .card-btn.dl { border-color: var(--wine); color: var(--wine); }
  .card-btn.dl:hover { background: var(--wine); color: white; }
  .card-btn.danger:hover { background: #fff0f0; border-color: #e74c3c; color: #e74c3c; }

  /* ── PREVIEW MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(20,10,10,0.7);
    backdrop-filter: blur(6px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: white;
    border-radius: 24px;
    max-width: 520px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn { from { transform: scale(0.92) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

  .modal-header {
    padding: 24px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--wine); }
  .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--muted); padding: 4px 8px; border-radius: 8px; }
  .modal-close:hover { background: var(--paper); }
  .modal-body { padding: 20px 24px 28px; }

  /* The big preview card inside modal */
  .preview-card {
    background: var(--cream);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--blush);
    box-shadow: 0 4px 20px rgba(44,31,31,0.08);
  }
  .preview-stamp-area {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    padding: 20px;
  }
  .preview-stamp-area canvas { border-radius: 8px; max-width: 100%; }
  .preview-info { padding: 20px; }
  .preview-info .p-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--wine); margin-bottom: 4px; }
  .preview-info .p-date { font-size: 0.82rem; color: var(--muted); margin-bottom: 12px; }
  .preview-info .p-note { font-size: 0.92rem; color: var(--ink); line-height: 1.65; }
  .preview-info .p-mood { margin-top: 12px; font-size: 1.3rem; }

  .modal-dl-btn {
    width: 100%;
    margin-top: 16px;
    padding: 13px;
    background: linear-gradient(135deg, var(--rose), var(--wine));
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-dl-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(139,58,58,0.25); }

  /* empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    grid-column: 1/-1;
  }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-style: italic; }

  /* stamp border animation */
  .stamp-border {
    position: absolute;
    inset: 6px;
    border-radius: 8px;
    pointer-events: none;
    z-index: 2;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--blush); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>Chapters</h1>
  <p>every moment deserves a page</p>
</header>

<div class="container">

  <!-- FORM -->
  <div class="form-card" id="formCard">
    <div class="section-title">✦ <span id="formTitle">Add a Chapter</span></div>
    <input type="hidden" id="editIndex" value="">

    <!-- Image Upload -->
    <div class="image-preview-wrapper" id="previewWrapper">
      <div class="image-scroll-area" id="scrollArea">
        <img id="previewImg" src="" alt="preview">
      </div>
      <div class="image-meta">
        <span id="imgDimensions" style="font-size:0.8rem;color:var(--muted)"></span>
        <button class="btn-change" onclick="document.getElementById('fileInput').click()">🔄 Change photo</button>
      </div>
      <!-- Stamp style selector -->
      <div>
        <div class="mood-label">Photo style</div>
        <div class="stamp-options">
          <div class="stamp-opt active" data-stamp="original" onclick="selectStamp(this,'original')">🖼 Original</div>
          <div class="stamp-opt" data-stamp="stamp-red" onclick="selectStamp(this,'stamp-red')">🔴 Red Stamp</div>
          <div class="stamp-opt" data-stamp="stamp-blue" onclick="selectStamp(this,'stamp-blue')">🔵 Blue Stamp</div>
          <div class="stamp-opt" data-stamp="stamp-gold" onclick="selectStamp(this,'stamp-gold')">🟡 Gold Stamp</div>
          <div class="stamp-opt" data-stamp="cutout" onclick="selectStamp(this,'cutout')">✂️ Cutout</div>
          <div class="stamp-opt" data-stamp="polaroid" onclick="selectStamp(this,'polaroid')">📷 Polaroid</div>
        </div>
      </div>
    </div>

    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept="image/*" onchange="handleImageUpload(event)">
      <div class="upload-icon">📸</div>
      <div class="upload-text">Click to upload a photo<br><strong>any size, shown in full</strong></div>
    </div>

    <!-- Fields -->
    <div class="fields-grid">
      <div class="field-group">
        <label for="titleInput">Chapter title</label>
        <input type="text" id="titleInput" placeholder="e.g. First date at the park">
      </div>
      <div class="field-group">
        <label for="dateInput">Date</label>
        <input type="date" id="dateInput">
      </div>
      <div class="field-group" style="grid-column:1/-1">
        <label for="noteInput">Memory note</label>
        <textarea id="noteInput" placeholder="What made this moment special..."></textarea>
      </div>
    </div>

    <!-- Heart Rating -->
    <div class="mood-section">
      <div class="mood-label">How much did this moment mean?</div>
      <div class="heart-rating" id="heartRating">
        <span class="heart" data-val="1" onmouseenter="hoverHearts(1)" onmouseleave="unhoverHearts()" onclick="selectHearts(1)">♥</span>
        <span class="heart" data-val="2" onmouseenter="hoverHearts(2)" onmouseleave="unhoverHearts()" onclick="selectHearts(2)">♥</span>
        <span class="heart" data-val="3" onmouseenter="hoverHearts(3)" onmouseleave="unhoverHearts()" onclick="selectHearts(3)">♥</span>
        <span class="heart" data-val="4" onmouseenter="hoverHearts(4)" onmouseleave="unhoverHearts()" onclick="selectHearts(4)">♥</span>
        <span class="heart" data-val="5" onmouseenter="hoverHearts(5)" onmouseleave="unhoverHearts()" onclick="selectHearts(5)">♥</span>
        <span class="mood-caption" id="moodCaption"></span>
      </div>
    </div>

    <button class="btn-save" onclick="saveChapter()">✦ Save Chapter</button>
  </div>

  <!-- CHAPTERS -->
  <div>
    <div class="chapters-header">
      <h2>Our Story</h2>
      <span style="color:var(--muted);font-size:0.85rem" id="countLabel"></span>
    </div>
    <div class="chapters-grid" id="chaptersGrid"></div>
  </div>
</div>

<!-- PREVIEW MODAL -->
<div class="modal-overlay" id="previewModal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle">Chapter</h3>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-body">
      <div class="preview-card">
        <div class="preview-stamp-area" id="previewStampArea">
          <canvas id="previewCanvas"></canvas>
        </div>
        <div class="preview-info">
          <div class="p-title" id="previewTitle"></div>
          <div class="p-date" id="previewDate"></div>
          <div class="p-note" id="previewNote"></div>
          <div class="p-mood" id="previewMood"></div>
        </div>
      </div>
      <button class="modal-dl-btn" onclick="downloadCard()">⬇ Download this card</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let chapters = JSON.parse(localStorage.getItem('chapters') || '[]');
let currentImageDataURL = null;
let selectedStamp = 'original';
let selectedMood = null;
let previewingIndex = null;

// ── IMAGE UPLOAD ──
function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    currentImageDataURL = ev.target.result;
    const img = document.getElementById('previewImg');
    img.onload = () => {
      document.getElementById('imgDimensions').textContent = `${img.naturalWidth} × ${img.naturalHeight}px`;
    };
    img.src = currentImageDataURL;
    document.getElementById('previewWrapper').classList.add('has-image');
    document.getElementById('uploadZone').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// ── STAMP SELECTION ──
function selectStamp(el, val) {
  document.querySelectorAll('.stamp-opt').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  selectedStamp = val;
}

// ── HEART RATING ──
const heartCaptions = ['', 'just a moment', 'kind of special', 'really good', 'so precious', 'my whole heart ♥'];

function hoverHearts(val) {
  document.querySelectorAll('.heart').forEach(h => {
    h.classList.toggle('lit', parseInt(h.dataset.val) <= val);
  });
  document.getElementById('moodCaption').textContent = heartCaptions[val];
  document.getElementById('moodCaption').style.color = 'var(--rose)';
}
function unhoverHearts() {
  const cur = selectedMood || 0;
  document.querySelectorAll('.heart').forEach(h => {
    h.classList.toggle('lit', parseInt(h.dataset.val) <= cur);
  });
  document.getElementById('moodCaption').textContent = cur ? heartCaptions[cur] : '';
  document.getElementById('moodCaption').style.color = '';
}
function selectHearts(val) {
  selectedMood = val;
  unhoverHearts();
}
function resetHearts() {
  selectedMood = null;
  document.querySelectorAll('.heart').forEach(h => h.classList.remove('lit'));
  document.getElementById('moodCaption').textContent = '';
}
function setHearts(val) {
  selectedMood = val;
  unhoverHearts();
}

// ── SAVE ──
function saveChapter() {
  const title = document.getElementById('titleInput').value.trim();
  const date = document.getElementById('dateInput').value;
  const note = document.getElementById('noteInput').value.trim();
  const editIdx = document.getElementById('editIndex').value;

  if (!title) { alert('Please add a title!'); return; }

  const chapter = { title, date, note, mood: selectedMood, image: currentImageDataURL, stamp: selectedStamp };

  if (editIdx !== '') {
    chapters[parseInt(editIdx)] = chapter;
  } else {
    chapters.push(chapter);
  }

  localStorage.setItem('chapters', JSON.stringify(chapters));
  resetForm();
  renderChapters();
}

function resetForm() {
  document.getElementById('titleInput').value = '';
  document.getElementById('dateInput').value = '';
  document.getElementById('noteInput').value = '';
  document.getElementById('editIndex').value = '';
  document.getElementById('formTitle').textContent = 'Add a Chapter';
  currentImageDataURL = null;
  selectedMood = null;
  selectedStamp = 'original';
  resetHearts();
  document.querySelectorAll('.stamp-opt').forEach(o => o.classList.remove('active'));
  document.querySelector('[data-stamp="original"]').classList.add('active');
  document.getElementById('previewWrapper').classList.remove('has-image');
  document.getElementById('uploadZone').style.display = '';
  document.getElementById('fileInput').value = '';
}

// ── RENDER STAMP CANVAS ──
function drawStampCanvas(canvas, imageDataURL, stampStyle, width, height) {
  const ctx = canvas.getContext('2d');
  canvas.width = width;
  canvas.height = height;

  if (!imageDataURL) {
    ctx.fillStyle = '#f3ede3';
    ctx.fillRect(0, 0, width, height);
    ctx.fillStyle = '#c97d6e';
    ctx.font = '32px serif';
    ctx.textAlign = 'center';
    ctx.fillText('📷', width/2, height/2+10);
    return;
  }

  const img = new Image();
  img.onload = () => {
    ctx.clearRect(0, 0, width, height);

    if (stampStyle === 'polaroid') {
      // White border, bottom label area
      const pad = 12, bottom = 36;
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, width, height);
      ctx.save();
      ctx.rect(pad, pad, width - pad*2, height - pad - bottom);
      ctx.clip();
      drawCovered(ctx, img, pad, pad, width - pad*2, height - pad - bottom);
      ctx.restore();
      // shadow line
      ctx.fillStyle = '#e8e0d8';
      ctx.fillRect(pad, height - bottom - 1, width - pad*2, 1);

    } else if (stampStyle === 'cutout') {
      // Scalloped / cutout border
      const margin = 14;
      ctx.fillStyle = '#f3ede3';
      ctx.fillRect(0, 0, width, height);
      ctx.save();
      cutoutClipPath(ctx, margin, margin, width-margin*2, height-margin*2, 8);
      drawCovered(ctx, img, margin, margin, width-margin*2, height-margin*2);
      ctx.restore();
      // dashed border
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = '#c97d6e';
      ctx.lineWidth = 1.5;
      cutoutClipPath(ctx, margin, margin, width-margin*2, height-margin*2, 8, true);

    } else if (stampStyle === 'original') {
      drawCovered(ctx, img, 0, 0, width, height);

    } else {
      // Stamp styles: red, blue, gold
      const colors = { 'stamp-red': '#c0392b', 'stamp-blue': '#2c6496', 'stamp-gold': '#c9a84c' };
      const color = colors[stampStyle] || '#c0392b';
      const pad = 10;

      ctx.fillStyle = '#faf7f2';
      ctx.fillRect(0, 0, width, height);

      // draw photo
      drawCovered(ctx, img, pad, pad, width-pad*2, height-pad*2-14);

      // Stamp frame
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.setLineDash([]);
      // outer serrated edge
      drawSerratedRect(ctx, pad-4, pad-4, width-pad*2+8, height-pad*2-14+8, 6, color);

      // Ink worn overlay
      ctx.save();
      ctx.globalAlpha = 0.07;
      ctx.fillStyle = color;
      ctx.fillRect(pad, pad, width-pad*2, height-pad*2-14);
      ctx.restore();

      // bottom strip - color band
      ctx.fillStyle = color;
      ctx.fillRect(pad, height-pad-12, width-pad*2, 12);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = `bold ${Math.round(height*0.04)+7}px 'DM Sans', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('✦  MEMORY  ✦', width/2, height-pad-6);
    }
  };
  img.src = imageDataURL;
}

function drawCovered(ctx, img, x, y, w, h) {
  const imgAR = img.naturalWidth / img.naturalHeight;
  const areaAR = w / h;
  let sx, sy, sw, sh;
  if (imgAR > areaAR) {
    sh = img.naturalHeight; sw = sh * areaAR;
    sx = (img.naturalWidth - sw) / 2; sy = 0;
  } else {
    sw = img.naturalWidth; sh = sw / areaAR;
    sx = 0; sy = (img.naturalHeight - sh) / 2;
  }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

function drawSerratedRect(ctx, x, y, w, h, teethSize, color) {
  ctx.beginPath();
  const steps = 6;
  // top
  for (let i = 0; i <= w; i += steps) {
    ctx.lineTo(x+i, y + (i%12===0 ? -3 : 0));
  }
  ctx.lineTo(x+w, y);
  // right
  for (let i = 0; i <= h; i += steps) {
    ctx.lineTo(x+w + (i%12===0 ? 3 : 0), y+i);
  }
  ctx.lineTo(x+w, y+h);
  // bottom
  for (let i = w; i >= 0; i -= steps) {
    ctx.lineTo(x+i, y+h + (i%12===0 ? 3 : 0));
  }
  ctx.lineTo(x, y+h);
  // left
  for (let i = h; i >= 0; i -= steps) {
    ctx.lineTo(x - (i%12===0 ? 3 : 0), y+i);
  }
  ctx.closePath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
}

function cutoutClipPath(ctx, x, y, w, h, r, strokeOnly = false) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
  if (strokeOnly) ctx.stroke(); else ctx.clip();
}

// ── RENDER CHAPTERS ──
function renderChapters() {
  const grid = document.getElementById('chaptersGrid');
  const count = document.getElementById('countLabel');
  grid.innerHTML = '';
  count.textContent = chapters.length ? `${chapters.length} chapter${chapters.length>1?'s':''}` : '';

  if (!chapters.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">📖</div><p>Your story is waiting to be written...</p></div>';
    return;
  }

  chapters.forEach((ch, i) => {
    const card = document.createElement('div');
    card.className = 'memory-card';

    const dateStr = ch.date ? new Date(ch.date + 'T00:00').toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'}) : '';

    card.innerHTML = `
      <div class="card-image-area">
        <canvas id="cardCanvas${i}" width="300" height="180"></canvas>
      </div>
      <div class="card-body">
        <div class="card-title">${ch.title}</div>
        ${dateStr ? `<div class="card-date">${dateStr}</div>` : ''}
        ${ch.note ? `<div class="card-note">${ch.note}</div>` : ''}
        ${ch.mood ? `<div class="card-mood">${'♥'.repeat(ch.mood)}<span style="color:#e0d0ca">${'♥'.repeat(5-ch.mood)}</span></div>` : ''}
      </div>
      <div class="card-actions">
        <button class="card-btn" onclick="previewCard(${i})">👁 Preview</button>
        <button class="card-btn edit" onclick="editChapter(${i})">✏️ Edit</button>
        <button class="card-btn dl" onclick="downloadSingleCard(${i})">⬇</button>
        <button class="card-btn danger" onclick="removeChapter(${i})">🗑</button>
      </div>
    `;
    grid.appendChild(card);

    // Draw stamp on card canvas
    setTimeout(() => {
      const canvas = document.getElementById(`cardCanvas${i}`);
      if (canvas) drawStampCanvas(canvas, ch.image, ch.stamp || 'original', 300, 180);
    }, 50);
  });
}

// ── EDIT (fix: load back all data) ──
function editChapter(i) {
  const ch = chapters[i];
  document.getElementById('editIndex').value = i;
  document.getElementById('formTitle').textContent = 'Edit Chapter';
  document.getElementById('titleInput').value = ch.title;
  document.getElementById('dateInput').value = ch.date || '';
  document.getElementById('noteInput').value = ch.note || '';

  // image
  if (ch.image) {
    currentImageDataURL = ch.image;
    const img = document.getElementById('previewImg');
    img.src = ch.image;
    img.onload = () => {
      document.getElementById('imgDimensions').textContent = `${img.naturalWidth} × ${img.naturalHeight}px`;
    };
    document.getElementById('previewWrapper').classList.add('has-image');
    document.getElementById('uploadZone').style.display = 'none';
  }

  // stamp
  selectedStamp = ch.stamp || 'original';
  document.querySelectorAll('.stamp-opt').forEach(o => {
    o.classList.toggle('active', o.dataset.stamp === selectedStamp);
  });

  // mood (heart rating)
  if (ch.mood) setHearts(ch.mood); else resetHearts();

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── REMOVE ──
function removeChapter(i) {
  if (!confirm('Remove this chapter?')) return;
  chapters.splice(i, 1);
  localStorage.setItem('chapters', JSON.stringify(chapters));
  renderChapters();
}

// ── PREVIEW MODAL ──
function previewCard(i) {
  const ch = chapters[i];
  previewingIndex = i;
  document.getElementById('modalTitle').textContent = ch.title;
  document.getElementById('previewTitle').textContent = ch.title;
  const dateStr = ch.date ? new Date(ch.date + 'T00:00').toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'}) : '';
  document.getElementById('previewDate').textContent = dateStr;
  document.getElementById('previewNote').textContent = ch.note || '';
  document.getElementById('previewMood').innerHTML = ch.mood
    ? `<span style="color:var(--rose);font-size:1.4rem">${'♥'.repeat(ch.mood)}</span><span style="color:#e0d0ca;font-size:1.4rem">${'♥'.repeat(5-ch.mood)}</span> <span style="font-size:0.85rem;color:var(--muted);font-style:italic">${heartCaptions[ch.mood]}</span>`
    : '';
  document.getElementById('previewModal').classList.add('open');

  setTimeout(() => {
    const canvas = document.getElementById('previewCanvas');
    drawStampCanvas(canvas, ch.image, ch.stamp || 'original', 440, 300);
  }, 80);
}

function closeModal(e) { if (e.target === document.getElementById('previewModal')) closeModalBtn(); }
function closeModalBtn() { document.getElementById('previewModal').classList.remove('open'); }

// ── DOWNLOAD ──
function downloadCard() { if (previewingIndex !== null) downloadSingleCard(previewingIndex); }

function downloadSingleCard(i) {
  const ch = chapters[i];
  // Build a full card canvas for download
  const w = 600, h = 800;
  const offCanvas = document.createElement('canvas');
  offCanvas.width = w; offCanvas.height = h;
  const ctx = offCanvas.getContext('2d');

  // Background
  ctx.fillStyle = '#faf7f2';
  ctx.fillRect(0, 0, w, h);

  // Top gradient strip
  const grad = ctx.createLinearGradient(0,0,w,0);
  grad.addColorStop(0,'#e8c4b8'); grad.addColorStop(0.5,'#c97d6e'); grad.addColorStop(1,'#8b3a3a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, 5);

  // Draw stamp image area
  const imgH = 360;
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = w; tempCanvas.height = imgH;
  drawStampCanvas(tempCanvas, ch.image, ch.stamp || 'original', w, imgH);

  // Wait for image to load in stamp
  setTimeout(() => {
    ctx.drawImage(tempCanvas, 0, 10, w, imgH);

    // Text area
    ctx.fillStyle = '#2c1f1f';
    ctx.font = `italic bold 28px 'Georgia', serif`;
    ctx.fillText(ch.title, 36, imgH + 50);

    if (ch.date) {
      const dateStr = new Date(ch.date + 'T00:00').toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
      ctx.fillStyle = '#8a7a72';
      ctx.font = `16px 'Georgia', serif`;
      ctx.fillText(dateStr, 36, imgH + 78);
    }

    if (ch.mood) {
      ctx.fillStyle = '#c97d6e';
      ctx.font = '22px serif';
      ctx.fillText('♥'.repeat(ch.mood) + '♡'.repeat(5 - ch.mood), w - 36 - ch.mood * 14, imgH + 60);
    }

    if (ch.note) {
      ctx.fillStyle = '#2c1f1f';
      ctx.font = `17px 'Georgia', serif`;
      wrapText(ctx, ch.note, 36, imgH + 120, w-72, 26);
    }

    // Bottom mark
    ctx.fillStyle = '#c9a84c';
    ctx.font = `12px 'Georgia', serif`;
    ctx.textAlign = 'center';
    ctx.fillText('✦  Chapters  ✦', w/2, h-24);

    const link = document.createElement('a');
    link.download = `chapter-${ch.title.replace(/\s+/g,'-')}.png`;
    link.href = offCanvas.toDataURL('image/png');
    link.click();
  }, 400);
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + ' ';
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && n > 0) {
      ctx.fillText(line, x, y);
      line = words[n] + ' ';
      y += lineHeight;
    } else { line = testLine; }
  }
  ctx.fillText(line, x, y);
}

// ── INIT ──
renderChapters();
</script>
